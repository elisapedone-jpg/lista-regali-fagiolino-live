<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Lista Regali 🎁</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f7;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.2rem;
    }

    .item {
      background: #ffffff;
      border-radius: 16px;
      padding: 22px;
      margin: 18px auto;
      max-width: 430px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    .item h3 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 1.5rem;
    }

    .price, .raised {
      font-size: 1.1rem;
      margin: 8px 0;
    }

    .progress {
      background: #e8e8e8;
      border-radius: 999px;
      overflow: hidden;
      height: 20px;
      margin: 16px 0 10px;
    }

    .progress-bar {
      height: 100%;
      background: #3b82f6;
      width: 0%;
      transition: width 0.3s ease;
    }

    .product-link {
      display: inline-block;
      margin-top: 8px;
      color: #2563eb;
      text-decoration: none;
      font-size: 1.05rem;
    }

    .product-link:hover {
      text-decoration: underline;
    }

    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 11px 18px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 14px;
      font-size: 0.95rem;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <h1>Lista Regali 🎁</h1>

  <div id="list">Caricamento...</div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxnZ1caFO0s1aAl03hgN2pd7DCnKaebnOB2COwdxzDtcMk9JIJVW5jMoNXjCisSeYt2sg/exec";

    async function loadItems() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();

        const container = document.getElementById("list");
        container.innerHTML = "";

        data.forEach(item => {
          const itemId = item.item_id || "";
          const itemName = item.item_name || "";
          const target = Number(item.target || 0);
          const collected = Number(item.collected || 0);
          const link = item.link || "";

          const percent = target > 0 ? Math.min((collected / target) * 100, 100) : 0;

          const div = document.createElement("div");
          div.className = "item";

          div.innerHTML = `
            <h3>${itemName}</h3>

            <div class="price"><strong>Prezzo:</strong> £${target.toFixed(2)}</div>

            <div class="progress">
              <div class="progress-bar" style="width:${percent}%"></div>
            </div>

            <div class="raised"><strong>Raccolti:</strong> £${collected.toFixed(2)}</div>

            ${link ? `<a class="product-link" href="${link}" target="_blank">Vedi prodotto</a>` : ""}

            <br>

            <button onclick="contribute('${itemId}')">Contribuisci</button>
          `;

          container.appendChild(div);
        });

      } catch (error) {
        document.getElementById("list").innerHTML = "<p>Errore nel caricamento dei dati.</p>";
        console.error(error);
      }
    }

    async function contribute(itemId) {
      const amount = prompt("Quanto vuoi contribuire?");
      if (!amount) return;

      const numericAmount = Number(String(amount).replace(",", "."));

      if (isNaN(numericAmount) || numericAmount <= 0) {
        alert("Inserisci un importo valido.");
        return;
      }

      try {
        await fetch(API_URL, {
          method: "POST",
          body: JSON.stringify({
            item_id: itemId,
            amount: numericAmount
          })
        });

        loadItems();

      } catch (error) {
        alert("Errore durante il contributo.");
        console.error(error);
      }
    }

    loadItems();
  </script>

</body>
</html>
