.admin-btn{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.6)}

.gift-card{background:#fff;border-radius:14px;padding:16px 18px;border:1px solid #e8e5df;margin-bottom:10px}

.gift-row{display:flex;align-items:flex-start;gap:12px}
.gift-thumb{width:52px;height:52px;border-radius:10px;background:#f0ede7;display:flex;align-items:center;justify-content:center;color:#8a9a7e;flex-shrink:0;overflow:hidden}

.gift-thumb.done{opacity:.6}
.gift-body{flex:1;min-width:0}
.gift-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.gift-name{font-size:14px;font-weight:600;line-height:1.35;flex:1;padding-right:8px}
.badge{background:#8a9a7e;color:#fff;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:700;white-space:nowrap}

.gift-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-contribute{background:linear-gradient(135deg,#8a9a7e,#a5aa6a);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px}

  plus:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`
};

let gifts=[];
let contribs={};
let viewImg=null;
let modal=null;
let modalStep=1;
let modalName="";
let modalAmount="";
let modalCopied=false;
let modalDone=false;
let adminOpen=false;
let adminAuth=false;
let confirmDelId=null;

const giftsRef=doc(db,"registry","gifts");
const contribsRef=doc(db,"registry","contributions");

async function initData(){
  try{
    const gs=await getDoc(giftsRef);
    gifts=gs.exists()?(gs.data().items||DEFAULT_GIFTS):DEFAULT_GIFTS;
    if(!gs.exists())await setDoc(giftsRef,{items:DEFAULT_GIFTS});
  }catch(e){gifts=DEFAULT_GIFTS;console.error(e)}
  try{
    const cs=await getDoc(contribsRef);
    if(cs.exists())contribs=cs.data()||{};
  }catch(e){console.error(e)}
  onSnapshot(giftsRef,s=>{if(s.exists()){gifts=s.data().items||[];render()}});
  onSnapshot(contribsRef,s=>{if(s.exists()){contribs=s.data()||{};render()}});
  render();
}

async function saveGifts(){try{await setDoc(giftsRef,{items:gifts})}catch(e){console.error(e)}}
async function saveContribs(){try{await setDoc(contribsRef,contribs)}catch(e){console.error(e)}}

function render(){
  document.getElementById("app").innerHTML=
    renderHero()+
    '<div class="container">'+gifts.map(renderGift).join('')+'</div>'+
    '<p class="footer">Grazie di cuore per il vostro contributo 🌿</p>'+
    (modal?renderContrib():'')+
    (viewImg?renderImg():'')+
    (adminOpen?renderAdmin():'');
}

function renderHero(){
  return`<div class="hero">
    <button class="admin-btn" onclick="openAdmin()">${SVG.gear}</button>
    <div class="hero-label">LISTA BABY</div>
    <h1>Andrea & Elisa</h1>
    <p>Il nostro piccolo nido sta prendendo forma 🌿<br>Se desiderate contribuire, interamente o parzialmente, a uno dei regali, potete farlo qui in modo semplice. Grazie di cuore ❤️!</p>
  </div>`;
}

function renderGift(g){
  const r=contribs[g.id]||0;
  const pct=Math.round(r/g.price*100);
  const done=pct>=100;
  const img=getImg(g);
  const thumb=img?`<img src="${img}" alt="">`:`${SVG.gift}`;
  const pctColor=pct>=100?'#8a9a7e':pct>50?'#a5aa6a':'#c0a44e';
  const barBg='#8a9a7e';
  return`<div class="gift-card${done?' complete':''}"><div class="gift-row">
    <div class="gift-thumb${done?' done':''}">${thumb}</div>
    <div class="gift-body">
      <div class="gift-header">
        <div class="gift-name">${esc(g.name)}</div>
        ${done?'<span class="badge">Completato ✓</span>':''}
      </div>
      <div class="gift-stats">
        <span>${fmt(r)} di ${fmt(g.price)}</span>
        <span class="gift-pct" style="color:${pctColor}">${pct}%</span>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${barBg}"></div></div>
      <div class="gift-actions">
        ${!done?`<button class="btn-contribute" onclick="openContrib('${g.id}')">${SVG.heart} Contribuisci</button>`:''}
        <button class="btn-see" onclick="viewGiftImg('${g.id}')">${SVG.eye} Vedi regalo</button>
        ${g.link?`<a href="${g.link}" target="_blank" rel="noopener noreferrer" class="btn-link">Link regalo ${SVG.ext}</a>`:''}
      </div>
    </div>
  </div></div>`;
}

function renderContrib(){
  const g=gifts.find(x=>x.id===modal);
  if(!g)return'';
  const r=contribs[g.id]||0;
  const left=g.price-r;
  let body='';
  if(modalDone){
    body=`<div style="text-align:center;padding:16px 0">
      <div class="success-icon">${SVG.check}</div>
      <h3 style="font-size:17px;margin:0 0 6px">Grazie, ${esc(modalName)}!</h3>
      <p style="color:#999;font-size:13px;margin:0 0 18px">Il tuo contributo è stato registrato.</p>
      <button class="btn-primary" style="width:auto;padding:10px 30px" onclick="closeContrib()">Chiudi</button>
    </div>`;
  }else if(modalStep===1){
    body=`<label class="field-label">Il tuo nome</label>
      <input class="field-input" id="cName" placeholder="es. Marco">
      <label class="field-label">Quanto vuoi contribuire (£)</label>
      <input class="field-input" id="cAmount" placeholder="Max ${fmt(left)}" inputmode="decimal">
      <button class="btn-primary" onclick="goStep2()">Avanti →</button>`;
  }else{
    const caus='Lista Baby - '+g.name+' - '+modalName;
    body=`<div class="bank-box">
      <p class="bank-title">Dettagli per il bonifico</p>
      <div class="bank-details">
        <div><strong>Intestatario:</strong> Andrea Chiarenza &amp; Elisa Pedone</div>
        <div><strong>IBAN:</strong> GB33 REVO 2301 2034 7187 31</div>
        <div><strong>BIC / SWIFT:</strong> REVOGB21</div>
        <div><strong>Importo:</strong> ${fmt(Number(modalAmount))}</div>
        <div style="margin-top:8px"><strong>Causale:</strong></div>
        <div class="bank-causale">${esc(caus)}</div>
      </div>
      <button class="btn-copy" onclick="copyCausale()">${SVG.copy} ${modalCopied?'Copiata!':'Copia causale'}</button>
    </div>
    <div class="btn-row">
      <button class="btn-back" onclick="goStep1()">← Indietro</button>
      <button class="btn-confirm" onclick="doConfirmContrib()">${SVG.check} Ho fatto il bonifico</button>
    </div>`;
  }
  return`<div class="overlay" onclick="closeContrib()"><div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeContrib()">${SVG.x}</button>
    <div class="modal-inner">
      <h2 class="modal-title">${esc(g.name)}</h2>
      <p class="modal-sub">Prezzo: ${fmt(g.price)} — Raccolto: ${fmt(r)}</p>
      ${body}
    </div>
  </div></div>`;
}

function renderImg(){
  const g=gifts.find(x=>x.id===viewImg);
  if(!g)return'';
  const img=getImg(g);
  let content='';
  if(img){
    content=`<img src="${img}" alt="${esc(g.name)}" onerror="this.style.display='none';document.getElementById('imgFallback').style.display='block'">
      <p class="img-fallback" id="imgFallback" style="display:none">Immagine non disponibile${g.link?'<br><br><a href="'+g.link+'" target="_blank">Vedi sul sito del negozio ↗</a>':''}</p>`;
  }else{
    content=`<p class="img-fallback">Immagine non ancora disponibile${g.link?'<br><br><a href="'+g.link+'" target="_blank">Vedi sul sito del negozio ↗</a>':''}</p>`;
  }
  return`<div class="img-overlay" onclick="closeImg()">
    <button class="img-close" onclick="closeImg()">${SVG.x}</button>
    <div onclick="event.stopPropagation()" style="text-align:center">
      <p class="img-name">${esc(g.name)}</p>
      ${content}
    </div>
  </div>`;
}

function renderAdmin(){
  let body='';
  if(!adminAuth){
    body=`<label class="field-label">Password</label>
      <input class="field-input" type="password" id="adminPwd" placeholder="Inserisci password" onkeydown="if(event.key==='Enter')tryLogin()">
      <div id="pwdErr"></div>
      <button class="btn-primary" style="margin-top:8px" onclick="tryLogin()">Accedi</button>`;
  }else{
    body=`<div class="admin-section">
      <p class="admin-section-title">Aggiungi regalo</p>
      <input class="admin-input" id="newName" placeholder="Nome regalo">
      <div class="admin-input-row">
        <input class="admin-input" style="margin:0" id="newPrice" placeholder="Prezzo (£)" inputmode="decimal">
        <input class="admin-input" style="margin:0;flex:2" id="newLink" placeholder="Link (opzionale)">
      </div>
      <input class="admin-input" id="newImg" placeholder="URL immagine (opzionale)">
      <button class="btn-add" onclick="addGift()">${SVG.plus} Aggiungi</button>
    </div>
    <p class="admin-section-title">Regali attuali</p>`;
    gifts.forEach(g=>{
      const r=contribs[g.id]||0;
      const del=confirmDelId===g.id;
      body+=`<div class="admin-gift">
        <div class="admin-gift-info">
          <div class="admin-gift-name">${esc(g.name)}</div>
          <div class="admin-gift-meta">${fmt(g.price)} — raccolto: ${fmt(r)}</div>
        </div>
        ${r>0?`<button class="btn-reset" onclick="resetC('${g.id}')">${SVG.reset} Azzera</button>`:''}
        ${del
          ?`<button class="btn-confirm-del" onclick="delGift('${g.id}')">Conferma</button><button class="btn-cancel-del" onclick="cancelDel()">No</button>`
          :`<button class="btn-delete" onclick="startDel('${g.id}')">${SVG.trash} Elimina</button>`}
      </div>`;
    });
  }
  return`<div class="overlay" onclick="closeAdmin()"><div class="modal modal-admin" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeAdmin()">${SVG.x}</button>
    <div class="modal-inner">
      <h2 style="font-size:18px;font-weight:700;margin:0 0 4px;color:#5a6b52">Pannello Admin</h2>
      <p class="modal-sub">Gestisci regali e contributi</p>
      ${body}
    </div>
  </div></div>`;
}

/* ── All global handlers ── */

window.openContrib=function(id){modal=id;modalStep=1;modalName="";modalAmount="";modalCopied=false;modalDone=false;render()};
window.closeContrib=function(){modal=null;render()};
window.goStep1=function(){modalStep=1;render()};
window.goStep2=function(){
  var el1=document.getElementById("cName");
  var el2=document.getElementById("cAmount");
  var n=el1?el1.value:"";
  var a=el2?(el2.value||"").replace(/[^0-9.]/g,""):"";
  if(!n.trim()){if(el1)el1.style.borderColor="#d9534f";return}
  if(!a||Number(a)<=0){if(el2)el2.style.borderColor="#d9534f";return}
  modalName=n;modalAmount=a;modalStep=2;render();
};
window.doConfirmContrib=function(){
  var g=gifts.find(function(x){return x.id===modal});
  if(!g)return;
  var a=Number(modalAmount);
  var prev=contribs[g.id]||0;
  var left=g.price-prev;
  if(left<=0||a<=0)return;
  contribs[g.id]=prev+Math.min(a,left);
  saveContribs();modalDone=true;render();
};
window.copyCausale=function(){
  var g=gifts.find(function(x){return x.id===modal});
  if(!g)return;
  var txt='Lista Baby - '+g.name+' - '+modalName;
  try{navigator.clipboard.writeText(txt)}catch(e){}
  modalCopied=true;render();
  setTimeout(function(){modalCopied=false;render()},2000);
};
window.viewGiftImg=function(id){viewImg=id;render()};
window.closeImg=function(){viewImg=null;render()};
window.openAdmin=function(){adminOpen=true;adminAuth=false;confirmDelId=null;render()};
window.closeAdmin=function(){adminOpen=false;render()};
window.tryLogin=function(){
  var el=document.getElementById("adminPwd");
  var v=el?el.value:"";
  if(v===ADMIN_PWD){adminAuth=true;render()}
  else{var e=document.getElementById("pwdErr");if(e)e.innerHTML='<p class="error-text">Password errata</p>'}
};
window.resetC=function(id){delete contribs[id];saveContribs();render()};
window.startDel=function(id){confirmDelId=id;render()};
window.cancelDel=function(){confirmDelId=null;render()};
window.delGift=function(id){
  gifts=gifts.filter(function(g){return g.id!==id});
  delete contribs[id];saveGifts();saveContribs();confirmDelId=null;render();
};
window.addGift=function(){
  var el1=document.getElementById("newName");
  var el2=document.getElementById("newPrice");
  var el3=document.getElementById("newLink");
  var el4=document.getElementById("newImg");
  var n=el1?el1.value:"";
  var p=el2?(el2.value||"").replace(/[^0-9.]/g,""):"";
  var l=el3?el3.value:"";
  var im=el4?el4.value:"";
  if(!n.trim()){if(el1)el1.style.borderColor="#d9534f";return}
  if(!p||Number(p)<=0){if(el2)el2.style.borderColor="#d9534f";return}
  gifts.push({id:"g_"+Date.now(),name:n.trim(),price:Number(p),link:l.trim(),img:im.trim()});
  saveGifts();render();
};

initData();
</script>
</body>
</html>
